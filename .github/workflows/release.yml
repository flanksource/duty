name: Create Release
on:
  push:
    branches:
      - main

permissions: {} # start with no permission

jobs:
  create-release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: flanksource/action-workflows/.github/workflows/create-release.yml@a7df3dcb783c34338e46318364e99c0ada62bcd9

  bump-clients:
    runs-on: ubuntu-latest
    needs: [create-release]
    if: needs.create-release.outputs.published == 'true'
    strategy:
      matrix:
        repos: ['mission-control', 'canary-checker', 'config-db', 'apm-hub', 'kopper']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: flanksource/${{ matrix.repos }}

          token: ${{ secrets.FLANKBOT }}
      - name: Setup Go
        uses: buildjet/setup-go@555ce355a95ff01018ffcf8fbbd9c44654db8374 # v5.0.2
        with:
          go-version: 1.26.x
          cache: false # Dependencies change on every run (new duty version)

      - name: Create commits
        run: |
          # Sleep to let index refresh
          sleep 60
          go get github.com/flanksource/duty@v${{ needs.create-release.outputs.version }}
          go mod tidy
          if [ -d "hack/generate-schemas" ]; then
            cd hack/generate-schemas && go mod tidy
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: 'bump-duty-auto-pr'
          commit-message: 'chore: bump duty to v${{ needs.create-release.outputs.version }}'
          title: 'chore: bump duty to v${{ needs.create-release.outputs.version }}'
          token: ${{ secrets.FLANKBOT }}
          labels: dependencies,ready

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.0.0
        with:
          token: ${{ secrets.FLANKBOT }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
          repository: flanksource/${{ matrix.repos }}
