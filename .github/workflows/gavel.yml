name: Gavel
on:
  pull_request:
permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write
jobs:
  gavel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16@sha256:47053cd4ee3f096afc744e53e3280de7b29b3670d2f2196c2acc0c6470923c99
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DUTY_DB_URL: postgres://postgres:password@localhost:5432/test?sslmode=disable
      DUTY_DB_CREATE: "false"
      DUTY_DB_DISABLE_RLS: "false"
    steps:
      - name: Install deps
        uses: flanksource/deps@f04324f706a671af0fd0b1d7f9a708c9ec1643f4 # v1.0.28
        with:
          tools: |
            bun
            uv
            powershell
            postgrest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version: 1.26.x

      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: cache-go-1.26.x-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            cache-go-1.26.x-

      - name: Install golangci-lint
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.bin"
          rm -f "$GITHUB_WORKSPACE/.bin/gavel"
          GOBIN="$GITHUB_WORKSPACE/.bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          file "$GITHUB_WORKSPACE/.bin/golangci-lint"
          "$GITHUB_WORKSPACE/.bin/golangci-lint" version
          echo "$GITHUB_WORKSPACE/.bin" >> "$GITHUB_PATH"

      - uses: flanksource/gavel@5df008d31d208c6f815fac634db33f0ddd5ca40f # main
        with:
          args: >-
            -vvvvv test --lint --bench=false
            --framework ginkgo
            --extra-args --label-filter=!e2e
            --ignore ./bench
            --ignore ./hack
            --ignore ./specs
            --ignore ./tests/e2e
            --ignore ./tests/e2e-blobs
            --concurrency=3
            --nodes=1
            --timeout=35m
            --test-timeout=10m
            --lint-timeout=10m
            --diagnostics
          fail-on-error: "true"

