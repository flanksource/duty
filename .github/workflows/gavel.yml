name: Gavel
on:
  pull_request:
permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write
jobs:
  gavel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version: 1.26.x

      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            .bin
          key: cache-go-1.26.x-${{ hashFiles('**/go.sum') }}-${{ hashFiles('.bin/*') }}
          restore-keys: |
            cache-go-1.26.x-

      - name: Install pinned gavel
        run: |
          set -euo pipefail
          git clone https://github.com/flanksource/gavel.git /tmp/gavel
          cd /tmp/gavel
          git checkout f5e4e66df93195f4c878776be59717a024fe74f1
          mkdir -p "$GITHUB_WORKSPACE/.bin"
          go build -o "$GITHUB_WORKSPACE/.bin/gavel" ./cmd/gavel
          file "$GITHUB_WORKSPACE/.bin/gavel"
          "$GITHUB_WORKSPACE/.bin/gavel" version
          GOBIN="$GITHUB_WORKSPACE/.bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          file "$GITHUB_WORKSPACE/.bin/golangci-lint"
          "$GITHUB_WORKSPACE/.bin/golangci-lint" version
          echo "$GITHUB_WORKSPACE/.bin" >> "$GITHUB_PATH"

      - uses: flanksource/gavel@f5e4e66df93195f4c878776be59717a024fe74f1
        with:
          version: source
          args: "-vv test --lint --bench=false --concurrency=2 --nodes=1 --timeout=25m --test-timeout=10m --lint-timeout=10m --diagnostics"
          fail-on-error: "true"
